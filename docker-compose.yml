services:
  bot:
    build: .
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN in .env}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:?Set API_FOOTBALL_KEY in .env}
      API_FOOTBALL_BASE_URL: ${API_FOOTBALL_BASE_URL:-https://v3.football.api-sports.io}
      DATABASE_URL: ${DATABASE_URL:-postgresql://football:football_password@postgres:5432/football_score_bot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FEATURED_LEAGUE_IDS: ${FEATURED_LEAGUE_IDS:-}
      FEATURED_COUNTRIES: ${FEATURED_COUNTRIES:-World,Europe,England,Spain,Italy,Germany,France,Portugal,Netherlands,Saudi-Arabia,USA,Japan,Korea-Republic,China}
      FEATURED_KEYWORDS: ${FEATURED_KEYWORDS:-World Cup,UEFA Champions League,Europa League,Premier League,La Liga,Serie A,Bundesliga,Ligue 1,AFC Champions League,Copa America,European Championship}
      MAX_FEATURED_MATCHES: ${MAX_FEATURED_MATCHES:-20}
      LIVE_REFRESH_SECONDS: ${LIVE_REFRESH_SECONDS:-60}
      TODAY_REFRESH_SECONDS: ${TODAY_REFRESH_SECONDS:-300}
      ODDS_REFRESH_SECONDS: ${ODDS_REFRESH_SECONDS:-120}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-zh-CN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-gmpay}
      GMPAY_PID: ${GMPAY_PID:-}
      GMPAY_BASE_URL: ${GMPAY_BASE_URL:-https://hosea.cc.cd}
      GMPAY_CREATE_ORDER_PATH: ${GMPAY_CREATE_ORDER_PATH:-/payments/gmpay/v1/order/create-transaction}
      GMPAY_SECRET: ${GMPAY_SECRET:-}
      GMPAY_SIGN_TYPE: ${GMPAY_SIGN_TYPE:-md5}
      GMPAY_NOTIFY_URL: ${GMPAY_NOTIFY_URL:-}
      GMPAY_REDIRECT_URL: ${GMPAY_REDIRECT_URL:-}
      GMPAY_DEFAULT_CURRENCY: ${GMPAY_DEFAULT_CURRENCY:-cny}
      GMPAY_DEFAULT_TOKEN: ${GMPAY_DEFAULT_TOKEN:-usdt}
      GMPAY_DEFAULT_NETWORK: ${GMPAY_DEFAULT_NETWORK:-tron}
      GMPAY_DEFAULT_PAYMENT_TYPE: ${GMPAY_DEFAULT_PAYMENT_TYPE:-}
      GMPAY_MIN_RECHARGE_USDT: ${GMPAY_MIN_RECHARGE_USDT:-2}
      GMPAY_ORDER_EXPIRE_MINUTES: ${GMPAY_ORDER_EXPIRE_MINUTES:-30}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-}
      SUPER_ADMIN_USER_IDS: ${SUPER_ADMIN_USER_IDS:-}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
      AGENT_USER_IDS: ${AGENT_USER_IDS:-}
      REFERRAL_DEPOSIT_COMMISSION_RATE: ${REFERRAL_DEPOSIT_COMMISSION_RATE:-0.00}
      REFERRAL_TURNOVER_COMMISSION_RATE: ${REFERRAL_TURNOVER_COMMISSION_RATE:-0.00}
      REFERRAL_AGENT_ENABLED: ${REFERRAL_AGENT_ENABLED:-true}
      MAX_REFERRAL_LEVEL: ${MAX_REFERRAL_LEVEL:-1}
      WALLET_CURRENCY: ${WALLET_CURRENCY:-USDT}
      WITHDRAW_ENABLED: ${WITHDRAW_ENABLED:-false}
      REAL_BETTING_ENABLED: ${REAL_BETTING_ENABLED:-false}
      MIN_RECHARGE_AMOUNT: ${MIN_RECHARGE_AMOUNT:-2}
      MAX_RECHARGE_AMOUNT: ${MAX_RECHARGE_AMOUNT:-1000}
      BET_SETTLEMENT_ADMIN_ONLY: ${BET_SETTLEMENT_ADMIN_ONLY:-false}
      BET_AUTO_SETTLEMENT_ENABLED: ${BET_AUTO_SETTLEMENT_ENABLED:-true}
      BET_SETTLEMENT_INTERVAL_SECONDS: ${BET_SETTLEMENT_INTERVAL_SECONDS:-60}
      SETTLEMENT_REQUIRE_FINAL_STATUS: ${SETTLEMENT_REQUIRE_FINAL_STATUS:-true}
      SETTLEMENT_NOTIFY_GROUP_ENABLED: ${SETTLEMENT_NOTIFY_GROUP_ENABLED:-false}
      SETTLEMENT_GROUP_CHAT_ID: ${SETTLEMENT_GROUP_CHAT_ID:-}
      SETTLEMENT_PUBLIC_WIN_MIN_PAYOUT: ${SETTLEMENT_PUBLIC_WIN_MIN_PAYOUT:-0}
      MIN_BET_AMOUNT: ${MIN_BET_AMOUNT:-2}
      MAX_BET_AMOUNT: ${MAX_BET_AMOUNT:-100}
      DEFAULT_BET_AMOUNT: ${DEFAULT_BET_AMOUNT:-2}
      BET_CANCEL_BEFORE_START_MINUTES: ${BET_CANCEL_BEFORE_START_MINUTES:-5}
      MIN_WITHDRAW_AMOUNT: ${MIN_WITHDRAW_AMOUNT:-10}
      REBATE_ENABLED: ${REBATE_ENABLED:-true}
      REBATE_REQUEST_ENABLED: ${REBATE_REQUEST_ENABLED:-true}
      REBATE_MODE: ${REBATE_MODE:-none}
      REBATE_BY_ACTIVE_REFERRALS_ENABLED: ${REBATE_BY_ACTIVE_REFERRALS_ENABLED:-false}
      REBATE_BY_TURNOVER_ENABLED: ${REBATE_BY_TURNOVER_ENABLED:-false}
      REBATE_SETTLEMENT_ADMIN_ONLY: ${REBATE_SETTLEMENT_ADMIN_ONLY:-true}
      AGENT_APPLICATION_ENABLED: ${AGENT_APPLICATION_ENABLED:-true}
      AGENT_MIN_TOTAL_DEPOSIT: ${AGENT_MIN_TOTAL_DEPOSIT:-100}
      AGENT_MIN_TOTAL_TURNOVER: ${AGENT_MIN_TOTAL_TURNOVER:-500}
      AGENT_MIN_VALID_REFERRALS: ${AGENT_MIN_VALID_REFERRALS:-5}
      WORLDCUP_DEMO_MARKETS_ENABLED: ${WORLDCUP_DEMO_MARKETS_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: python -m football_score_bot.api_server
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN in .env}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY:?Set API_FOOTBALL_KEY in .env}
      API_FOOTBALL_BASE_URL: ${API_FOOTBALL_BASE_URL:-https://v3.football.api-sports.io}
      DATABASE_URL: ${DATABASE_URL:-postgresql://football:football_password@postgres:5432/football_score_bot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-zh-CN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-gmpay}
      GMPAY_PID: ${GMPAY_PID:-}
      GMPAY_BASE_URL: ${GMPAY_BASE_URL:-https://hosea.cc.cd}
      GMPAY_CREATE_ORDER_PATH: ${GMPAY_CREATE_ORDER_PATH:-/payments/gmpay/v1/order/create-transaction}
      GMPAY_SECRET: ${GMPAY_SECRET:-}
      GMPAY_SIGN_TYPE: ${GMPAY_SIGN_TYPE:-md5}
      GMPAY_NOTIFY_URL: ${GMPAY_NOTIFY_URL:-}
      GMPAY_REDIRECT_URL: ${GMPAY_REDIRECT_URL:-}
      GMPAY_DEFAULT_CURRENCY: ${GMPAY_DEFAULT_CURRENCY:-cny}
      GMPAY_DEFAULT_TOKEN: ${GMPAY_DEFAULT_TOKEN:-usdt}
      GMPAY_DEFAULT_NETWORK: ${GMPAY_DEFAULT_NETWORK:-tron}
      GMPAY_DEFAULT_PAYMENT_TYPE: ${GMPAY_DEFAULT_PAYMENT_TYPE:-}
      GMPAY_MIN_RECHARGE_USDT: ${GMPAY_MIN_RECHARGE_USDT:-2}
      GMPAY_ORDER_EXPIRE_MINUTES: ${GMPAY_ORDER_EXPIRE_MINUTES:-30}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-}
      SUPER_ADMIN_USER_IDS: ${SUPER_ADMIN_USER_IDS:-}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
      AGENT_USER_IDS: ${AGENT_USER_IDS:-}
      REFERRAL_DEPOSIT_COMMISSION_RATE: ${REFERRAL_DEPOSIT_COMMISSION_RATE:-0.00}
      REFERRAL_TURNOVER_COMMISSION_RATE: ${REFERRAL_TURNOVER_COMMISSION_RATE:-0.00}
      REFERRAL_AGENT_ENABLED: ${REFERRAL_AGENT_ENABLED:-true}
      MAX_REFERRAL_LEVEL: ${MAX_REFERRAL_LEVEL:-1}
      WALLET_CURRENCY: ${WALLET_CURRENCY:-USDT}
      WITHDRAW_ENABLED: ${WITHDRAW_ENABLED:-false}
      REAL_BETTING_ENABLED: ${REAL_BETTING_ENABLED:-false}
      MIN_RECHARGE_AMOUNT: ${MIN_RECHARGE_AMOUNT:-2}
      MAX_RECHARGE_AMOUNT: ${MAX_RECHARGE_AMOUNT:-1000}
      BET_SETTLEMENT_ADMIN_ONLY: ${BET_SETTLEMENT_ADMIN_ONLY:-false}
      BET_AUTO_SETTLEMENT_ENABLED: ${BET_AUTO_SETTLEMENT_ENABLED:-true}
      BET_SETTLEMENT_INTERVAL_SECONDS: ${BET_SETTLEMENT_INTERVAL_SECONDS:-60}
      SETTLEMENT_REQUIRE_FINAL_STATUS: ${SETTLEMENT_REQUIRE_FINAL_STATUS:-true}
      SETTLEMENT_NOTIFY_GROUP_ENABLED: ${SETTLEMENT_NOTIFY_GROUP_ENABLED:-false}
      SETTLEMENT_GROUP_CHAT_ID: ${SETTLEMENT_GROUP_CHAT_ID:-}
      SETTLEMENT_PUBLIC_WIN_MIN_PAYOUT: ${SETTLEMENT_PUBLIC_WIN_MIN_PAYOUT:-0}
      MIN_BET_AMOUNT: ${MIN_BET_AMOUNT:-2}
      MAX_BET_AMOUNT: ${MAX_BET_AMOUNT:-100}
      DEFAULT_BET_AMOUNT: ${DEFAULT_BET_AMOUNT:-2}
      BET_CANCEL_BEFORE_START_MINUTES: ${BET_CANCEL_BEFORE_START_MINUTES:-5}
      MIN_WITHDRAW_AMOUNT: ${MIN_WITHDRAW_AMOUNT:-10}
      REBATE_ENABLED: ${REBATE_ENABLED:-true}
      REBATE_REQUEST_ENABLED: ${REBATE_REQUEST_ENABLED:-true}
      REBATE_MODE: ${REBATE_MODE:-none}
      REBATE_BY_ACTIVE_REFERRALS_ENABLED: ${REBATE_BY_ACTIVE_REFERRALS_ENABLED:-false}
      REBATE_BY_TURNOVER_ENABLED: ${REBATE_BY_TURNOVER_ENABLED:-false}
      REBATE_SETTLEMENT_ADMIN_ONLY: ${REBATE_SETTLEMENT_ADMIN_ONLY:-true}
      AGENT_APPLICATION_ENABLED: ${AGENT_APPLICATION_ENABLED:-true}
      AGENT_MIN_TOTAL_DEPOSIT: ${AGENT_MIN_TOTAL_DEPOSIT:-100}
      AGENT_MIN_TOTAL_TURNOVER: ${AGENT_MIN_TOTAL_TURNOVER:-500}
      AGENT_MIN_VALID_REFERRALS: ${AGENT_MIN_VALID_REFERRALS:-5}
      WORLDCUP_DEMO_MARKETS_ENABLED: ${WORLDCUP_DEMO_MARKETS_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-football_score_bot}
      POSTGRES_USER: ${POSTGRES_USER:-football}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-football_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-football} -d ${POSTGRES_DB:-football_score_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
